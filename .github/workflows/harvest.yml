name: Harvest Game Pool

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run harvester
        run: python harvester/harvest.py

      - name: Commit updated game pool
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/games.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: weekly game pool refresh $(date -u +%Y-%m-%d)"
          git push
